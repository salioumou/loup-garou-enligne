<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Amis — Loup-Garou</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .friend-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: var(--card);
        border-radius: 12px;
        border: 1px solid #252d3a;
        margin-bottom: 8px;
        transition: 0.2s;
        gap: 10px;
        flex-wrap: wrap;
      }
      .friend-card:hover {
        border-color: #2a3550;
      }

      .online-dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        display: inline-block;
        flex-shrink: 0;
      }
      .dot-online {
        background: #6dbe6d;
        box-shadow: 0 0 5px #6dbe6d;
      }
      .dot-offline {
        background: #444;
      }

      /* ── Chat privé flottant ── */
      .chat-window {
        position: fixed;
        bottom: 0;
        width: 300px;
        background: #0e1118;
        border-radius: 14px 14px 0 0;
        border: 1px solid #252d3a;
        border-bottom: none;
        z-index: 100;
        display: none;
        flex-direction: column;
        box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.55);
      }
      .chat-window.open {
        display: flex;
      }
      .chat-window.minimized .chat-body {
        display: none;
      }

      .chat-header {
        padding: 9px 12px;
        background: #10131c;
        border-radius: 14px 14px 0 0;
        border-bottom: 1px solid #1e2535;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }
      .chat-header:hover {
        background: #141820;
      }

      .chat-msgs {
        height: 200px;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        scrollbar-width: thin;
        scrollbar-color: #252d3a transparent;
      }
      .chat-bubble {
        padding: 7px 11px;
        border-radius: 10px;
        max-width: 84%;
        line-height: 1.5;
        font-size: 0.82rem;
        word-break: break-word;
      }
      .bubble-me {
        background: #2a1a00;
        border: 1px solid var(--accent);
        color: var(--highlight);
        align-self: flex-end;
        border-radius: 10px 10px 2px 10px;
      }
      .bubble-them {
        background: #1c2230;
        border: 1px solid #252d3a;
        color: var(--text);
        align-self: flex-start;
        border-radius: 10px 10px 10px 2px;
      }
      .bubble-sys {
        font-style: italic;
        color: #555;
        font-size: 0.72rem;
        text-align: center;
        align-self: center;
      }
      .bubble-time {
        font-size: 0.6rem;
        color: #555;
        margin-top: 2px;
        display: block;
      }

      .unread-badge {
        background: #be4444;
        color: #fff;
        border-radius: 10px;
        padding: 1px 6px;
        font-size: 0.65rem;
        font-weight: 700;
        margin-left: 6px;
        vertical-align: middle;
      }

      .request-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        background: #10131c;
        border-radius: 12px;
        border: 1px solid #252d3a;
        margin-bottom: 8px;
        gap: 10px;
        flex-wrap: wrap;
      }

      .tab-active {
        background: var(--accent) !important;
        color: #000 !important;
        border-color: var(--accent) !important;
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          #1c2230 25%,
          #252d3a 50%,
          #1c2230 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.2s infinite;
        border-radius: 10px;
        height: 54px;
        margin-bottom: 8px;
      }
      @keyframes shimmer {
        0% {
          background-position: -200% 0;
        }
        100% {
          background-position: 200% 0;
        }
      }

      .typing-dots span {
        display: inline-block;
        width: 5px;
        height: 5px;
        background: #888;
        border-radius: 50%;
        margin: 0 1px;
        animation: typeBounce 1.2s infinite;
      }
      .typing-dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dots span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes typeBounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-5px);
        }
      }

      .msg-toast {
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: #1a1200;
        border: 1px solid var(--accent);
        border-radius: 12px;
        padding: 10px 16px;
        font-size: 0.82rem;
        color: var(--highlight);
        z-index: 200;
        display: none;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        max-width: 280px;
        animation: slideUp 0.25s ease;
      }
      .msg-toast.show {
        display: flex;
      }
      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body style="position: relative">
    <div class="notif" id="notif"></div>
    <div id="chat-windows"></div>
    <!-- Barre de chats ouverts (icônes persistantes) -->
    <div id="chat-dock" style="
      position:fixed;bottom:0;left:50%;transform:translateX(-50%);
      display:flex;gap:6px;padding:6px 12px;
      background:rgba(11,14,20,0.95);border-radius:14px 14px 0 0;
      border:1px solid #1e2535;border-bottom:none;
      z-index:99;align-items:flex-end;
      box-shadow:0 -4px 20px rgba(0,0,0,0.4);
      transition:0.2s;
    "></div>

    <!-- Toast message entrant -->
    <div class="msg-toast" id="msg-toast">
      <span id="msg-toast-text">💬 Nouveau message</span>
      <button
        onclick="document.getElementById('msg-toast').classList.remove('show')"
        style="
          background: none;
          border: none;
          color: #666;
          cursor: pointer;
          margin-left: auto;
          font-size: 1rem;
        "
      >
        ✕
      </button>
    </div>

    <div class="hero" style="min-height: 22vh">
      <div>
        <h1>👥 Mes Amis</h1>
        <p style="font-size: 0.95rem">
          Gérez vos amis, chattez et jouez ensemble !
        </p>
      </div>
    </div>

    <div style="max-width: 900px; margin: 0 auto; padding: 1rem 1rem 5rem">
      <button
        class="btn secondary"
        style="margin-bottom: 1.2rem; padding: 0.5rem 1rem; font-size: 0.85rem"
        onclick="window.location.href='accueil.html'"
      >
        ← Retour
      </button>

      <!-- Onglets -->
      <div
        style="display: flex; gap: 6px; margin-bottom: 1.2rem; flex-wrap: wrap"
      >
        <button
          class="btn tab-active"
          id="tab-btn-amis"
          style="font-size: 0.85rem; padding: 0.5rem 1.2rem"
          onclick="switchTab('amis')"
        >
          👥 Amis
          <span
            id="cnt-amis"
            style="
              background: rgba(0, 0, 0, 0.2);
              padding: 1px 6px;
              border-radius: 10px;
              margin-left: 4px;
            "
            >0</span
          >
        </button>
        <button
          class="btn secondary"
          id="tab-btn-demandes"
          style="font-size: 0.85rem; padding: 0.5rem 1.2rem"
          onclick="switchTab('demandes')"
        >
          📩 Demandes
          <span
            id="cnt-req"
            style="
              background: rgba(0, 0, 0, 0.2);
              padding: 1px 6px;
              border-radius: 10px;
              margin-left: 4px;
            "
            >0</span
          >
        </button>
        <button
          class="btn secondary"
          id="tab-btn-ajouter"
          style="font-size: 0.85rem; padding: 0.5rem 1.2rem"
          onclick="switchTab('ajouter')"
        >
          ➕ Ajouter
        </button>
      </div>

      <!-- Amis -->
      <div id="tab-amis">
        <input
          type="text"
          id="search-friends"
          placeholder="Rechercher un ami…"
          style="margin-bottom: 1rem"
          oninput="renderFriends()"
        />
        <div id="friends-list">
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton" style="width: 70%"></div>
        </div>
      </div>

      <!-- Demandes -->
      <div id="tab-demandes" style="display: none">
        <h3 style="margin-bottom: 0.75rem; color: var(--highlight)">
          Demandes reçues
        </h3>
        <div id="requests-in"></div>
        <h3 style="margin: 1.2rem 0 0.75rem; color: var(--highlight)">
          Demandes envoyées
        </h3>
        <div id="requests-out"></div>
      </div>

      <!-- Ajouter -->
      <div id="tab-ajouter" style="display: none">
        <div class="card">
          <h3 style="margin-bottom: 0.75rem">➕ Ajouter par pseudo</h3>
          <div style="display: flex; gap: 8px">
            <input
              type="text"
              id="add-pseudo"
              placeholder="Pseudo du joueur…"
              style="flex: 1; margin-bottom: 0"
              onkeydown="if(event.key==='Enter') sendRequest()"
            />
            <button
              class="btn"
              style="white-space: nowrap"
              onclick="sendRequest()"
            >
              Envoyer
            </button>
          </div>
          <div class="error-msg" id="err-add" style="margin-top: 8px"></div>
          <div
            id="ok-add"
            style="margin-top: 8px; color: #6dbe6d; font-size: 0.85rem"
          ></div>
        </div>

        <div class="card" style="margin-top: 1rem">
          <h3 style="margin-bottom: 0.75rem">🕑 Joueurs récents</h3>
          <p
            style="
              font-size: 0.8rem;
              color: #666;
              font-style: italic;
              margin-bottom: 8px;
            "
          >
            Joueurs avec qui vous avez récemment partagé un salon.
          </p>
          <div id="recent-players"></div>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        db,
        auth,
        ref,
        set,
        get,
        onValue,
        push,
        remove,
        update,
        onAuthStateChanged,
      } from "./firebase.js";

      // ── Auth guard ──────────────────────────────────────────────────────────
      const SK = "lg_session_v2";
      const sess = localStorage.getItem(SK);
      if (!sess) {
        window.location.href = "connexion.html";
      }
      const ME = JSON.parse(sess || "{}");

      onAuthStateChanged(auth, (user) => {
        if (!user) {
          localStorage.removeItem(SK);
          window.location.href = "connexion.html";
        }
      });

      // ── État ────────────────────────────────────────────────────────────────
      let myData = { friends: [], requestsIn: [], requestsOut: [] };
      let usersCache = {}; // uid → profil
      let presCache = {}; // uid → { ts }
      let openChats = {}; // friendId → { win, unread, unsub }
      let typingTimers = {};

      // ── Présence ────────────────────────────────────────────────────────────
      const myPresRef = ref(db, "presence/" + ME.id);
      const heartbeat = () => set(myPresRef, { name: ME.name, ts: Date.now() });
      heartbeat();
      setInterval(heartbeat, 20000);

      let _prevPresCache = {};
      onValue(ref(db, "presence"), (snap) => {
        const newPres = snap.exists() ? snap.val() : {};
        // Détecter les amis qui viennent de passer en ligne
        myData.friends.forEach(fid => {
          const wasOnline = _prevPresCache[fid] && Date.now() - (_prevPresCache[fid].ts||0) < 40000;
          const isNow = newPres[fid] && Date.now() - (newPres[fid].ts||0) < 40000;
          if (!wasOnline && isNow && usersCache[fid]) {
            showOnlineToast(usersCache[fid].name, fid);
          }
        });
        _prevPresCache = presCache;
        presCache = newPres;
        renderFriends();
      });

      function showOnlineToast(name, fid) {
        const t = document.createElement("div");
        t.style.cssText = "position:fixed;bottom:80px;left:16px;background:#1a2a1a;border:1px solid #6dbe6d;border-radius:12px;padding:10px 16px;font-size:0.82rem;color:#6dbe6d;z-index:300;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.5);max-width:260px;animation:slideUp 0.25s ease;cursor:pointer";
        t.innerHTML = `<span class="online-dot dot-online"></span> <strong>${esc(name)}</strong> est en ligne !
          <button onclick="this.parentNode.remove()" style="background:none;border:none;color:#555;cursor:pointer;margin-left:auto;font-size:1rem">✕</button>`;
        t.onclick = (e) => { if (e.target.tagName !== "BUTTON") { openChat(fid); t.remove(); } };
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 6000);
      }

      function online(uid) {
        return presCache[uid] && Date.now() - (presCache[uid].ts || 0) < 40000;
      }

      // ── Données d'amitié (temps réel) ──────────────────────────────────────
      const myFriendRef = ref(db, "friends/" + ME.id);

      onValue(myFriendRef, async (snap) => {
        myData = snap.exists() ? snap.val() : {};
        // Normaliser en tableaux
        ["friends", "requestsIn", "requestsOut"].forEach((k) => {
          if (!myData[k]) myData[k] = [];
          else if (!Array.isArray(myData[k]))
            myData[k] = Object.values(myData[k]);
        });

        // Charger les profils manquants
        const missing = [
          ...myData.friends,
          ...myData.requestsIn,
          ...myData.requestsOut,
        ].filter((id) => !usersCache[id]);
        await Promise.all(
          missing.map(async (id) => {
            const s = await get(ref(db, "users/" + id));
            if (s.exists()) usersCache[id] = s.val();
          })
        );

        updateBadges();
        renderFriends();
        renderRequests();
      });

      // ── Helpers ─────────────────────────────────────────────────────────────
      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function avatarHtml(u, size = 38) {
        if (u?.avatarUrl)
          return `<div style="width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;border:1.5px solid var(--accent);flex-shrink:0">
            <img src="${u.avatarUrl}" style="width:100%;height:100%;object-fit:cover;object-position:top"/></div>`;
        return `<div class="avatar" style="width:${size}px;height:${size}px;font-size:${Math.round(
          size * 0.38
        )}px;flex-shrink:0">
          ${(u?.name || "?")[0].toUpperCase()}</div>`;
      }

      function showNotif(msg, success = false) {
        const n = document.getElementById("notif");
        n.textContent = msg;
        n.style.display = "block";
        n.style.background = success ? "#1a3a1a" : "";
        setTimeout(() => (n.style.display = "none"), 3500);
      }

      function updateBadges() {
        document.getElementById("cnt-amis").textContent = myData.friends.length;
        document.getElementById("cnt-req").textContent =
          myData.requestsIn.length;
      }

      // ── Onglets ─────────────────────────────────────────────────────────────
      window.switchTab = function (t) {
        ["amis", "demandes", "ajouter"].forEach((x) => {
          document.getElementById("tab-" + x).style.display =
            x === t ? "block" : "none";
          const b = document.getElementById("tab-btn-" + x);
          if (b) b.className = x === t ? "btn tab-active" : "btn secondary";
        });
        if (t === "ajouter") renderRecent();
      };

      // ── LISTE AMIS ──────────────────────────────────────────────────────────
      window.renderFriends = function () {
        const q = (
          document.getElementById("search-friends")?.value || ""
        ).toLowerCase();
        const list = myData.friends
          .filter(
            (id) =>
              usersCache[id] &&
              (!q || usersCache[id].name.toLowerCase().includes(q))
          )
          .sort((a, b) => (online(b) ? 1 : 0) - (online(a) ? 1 : 0));

        const c = document.getElementById("friends-list");
        if (!list.length) {
          c.innerHTML = `<p style="color:#555;font-style:italic;padding:1.5rem 0;text-align:center">
            ${
              q
                ? "Aucun ami correspondant."
                : "Aucun ami pour l'instant — ajoutez-en !"
            }</p>`;
          return;
        }

        c.innerHTML = list
          .map((id) => {
            const u = usersCache[id];
            const on = online(id);
            const unread = openChats[id]?.unread || 0;
            return `<div class="friend-card">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="position:relative">
                ${avatarHtml(u, 40)}
                <span class="online-dot ${on ? "dot-online" : "dot-offline"}"
                  style="position:absolute;bottom:1px;right:1px;border:2px solid #0b0e14"></span>
              </div>
              <div>
                <div style="font-weight:600;color:var(--highlight)">${esc(
                  u.name
                )}</div>
                <div style="font-size:0.7rem;color:${
                  on ? "#6dbe6d" : "#555"
                };margin-top:1px">
                  ${on ? "● En ligne" : "Hors ligne"}</div>
              </div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <button class="btn secondary" style="font-size:0.75rem;padding:5px 11px;position:relative"
                onclick="openChat('${id}')">
                💬 Chat${
                  unread > 0
                    ? `<span class="unread-badge">${unread}</span>`
                    : ""
                }
              </button>
              <button class="btn secondary"
                style="font-size:0.75rem;padding:5px 9px;color:#be6d6d;border-color:#3a1a1a"
                onclick="removeFriend('${id}')">✕</button>
            </div>
          </div>`;
          })
          .join("");
      };

      // ── SUPPRIMER AMI ───────────────────────────────────────────────────────
      window.removeFriend = async function (id) {
        if (!confirm("Supprimer cet ami ?")) return;
        await update(myFriendRef, {
          friends: myData.friends.filter((x) => x !== id),
        });
        const theirRef = ref(db, "friends/" + id);
        const s = await get(theirRef);
        if (s.exists()) {
          const d = s.val();
          await update(theirRef, {
            friends: (d.friends || []).filter((x) => x !== ME.id),
          });
        }
        showNotif("Ami supprimé.");
      };

      // ── DEMANDES ────────────────────────────────────────────────────────────
      window.sendRequest = async function () {
        const pseudo = document.getElementById("add-pseudo").value.trim();
        const err = document.getElementById("err-add");
        const ok = document.getElementById("ok-add");
        err.textContent = "";
        ok.textContent = "";

        if (!pseudo) {
          err.textContent = "Entrez un pseudo.";
          return;
        }

        const snap = await get(ref(db, "users"));
        if (!snap.exists()) {
          err.textContent = "Aucun joueur trouvé.";
          return;
        }

        const target = Object.values(snap.val()).find(
          (u) => u.name.toLowerCase() === pseudo.toLowerCase()
        );
        if (!target) {
          err.textContent = `Joueur "${esc(pseudo)}" introuvable.`;
          return;
        }
        if (target.id === ME.id) {
          err.textContent = "Vous ne pouvez pas vous ajouter vous-même !";
          return;
        }
        if (myData.friends.includes(target.id)) {
          err.textContent = "Déjà votre ami !";
          return;
        }
        if (myData.requestsOut.includes(target.id)) {
          err.textContent = "Demande déjà envoyée.";
          return;
        }

        // Ma requestsOut
        await update(myFriendRef, {
          requestsOut: [...myData.requestsOut, target.id],
        });

        // Leur requestsIn
        const theirRef = ref(db, "friends/" + target.id);
        const ts = await get(theirRef);
        const td = ts.exists()
          ? ts.val()
          : { friends: [], requestsIn: [], requestsOut: [] };
        ["friends", "requestsIn", "requestsOut"].forEach((k) => {
          if (!td[k]) td[k] = [];
          else if (!Array.isArray(td[k])) td[k] = Object.values(td[k]);
        });
        await update(theirRef, { requestsIn: [...td.requestsIn, ME.id] });

        ok.textContent = `✅ Demande envoyée à ${esc(target.name)} !`;
        document.getElementById("add-pseudo").value = "";
      };

      window.renderRequests = function () {
        renderIn();
        renderOut();
      };

      function renderIn() {
        const c = document.getElementById("requests-in");
        if (!myData.requestsIn.length) {
          c.innerHTML = `<p style="color:#555;font-style:italic;font-size:0.85rem">Aucune demande reçue.</p>`;
          return;
        }
        c.innerHTML = myData.requestsIn
          .map((id) => {
            const u = usersCache[id];
            if (!u) return "";
            return `<div class="request-card">
            <div style="display:flex;align-items:center;gap:10px">
              ${avatarHtml(u, 38)}
              <div>
                <div style="font-weight:600">${esc(u.name)}</div>
                <div style="font-size:0.72rem;color:#888">veut être votre ami</div>
              </div>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn" style="font-size:0.78rem;padding:5px 12px;background:#1a3a1a;color:#6dbe6d;border:1px solid #3a6a3a"
                onclick="acceptReq('${id}')">✓ Accepter</button>
              <button class="btn secondary" style="font-size:0.78rem;padding:5px 10px;color:#be6d6d;border-color:#be6d6d"
                onclick="rejectReq('${id}')">✕ Refuser</button>
            </div>
          </div>`;
          })
          .join("");
      }

      function renderOut() {
        const c = document.getElementById("requests-out");
        if (!myData.requestsOut.length) {
          c.innerHTML = `<p style="color:#555;font-style:italic;font-size:0.85rem">Aucune demande en attente.</p>`;
          return;
        }
        c.innerHTML = myData.requestsOut
          .map((id) => {
            const u = usersCache[id];
            if (!u) return "";
            return `<div class="request-card">
            <div style="display:flex;align-items:center;gap:10px">
              ${avatarHtml(u, 38)}
              <div style="font-weight:600">${esc(u.name)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:0.72rem;color:#888;font-style:italic">En attente…</span>
              <button class="btn secondary" style="font-size:0.75rem;padding:4px 10px;color:#be6d6d;border-color:#be6d6d"
                onclick="cancelReq('${id}')">Annuler</button>
            </div>
          </div>`;
          })
          .join("");
      }

      window.acceptReq = async function (id) {
        const s = await get(myFriendRef);
        const d = s.exists() ? s.val() : {};
        ["friends", "requestsIn", "requestsOut"].forEach((k) => {
          if (!d[k]) d[k] = [];
          else if (!Array.isArray(d[k])) d[k] = Object.values(d[k]);
        });
        await update(myFriendRef, {
          requestsIn: d.requestsIn.filter((x) => x !== id),
          friends: [...new Set([...d.friends, id])],
        });
        const tr = ref(db, "friends/" + id);
        const ts = await get(tr);
        const td = ts.exists() ? ts.val() : {};
        ["friends", "requestsIn", "requestsOut"].forEach((k) => {
          if (!td[k]) td[k] = [];
          else if (!Array.isArray(td[k])) td[k] = Object.values(td[k]);
        });
        await update(tr, {
          requestsOut: td.requestsOut.filter((x) => x !== ME.id),
          friends: [...new Set([...td.friends, ME.id])],
        });
        showNotif(
          `✅ Vous êtes maintenant amis avec ${
            usersCache[id]?.name || "ce joueur"
          } !`,
          true
        );
      };

      window.rejectReq = async function (id) {
        await update(myFriendRef, {
          requestsIn: myData.requestsIn.filter((x) => x !== id),
        });
      };

      window.cancelReq = async function (id) {
        await update(myFriendRef, {
          requestsOut: myData.requestsOut.filter((x) => x !== id),
        });
        const tr = ref(db, "friends/" + id);
        const ts = await get(tr);
        if (ts.exists()) {
          const td = ts.val();
          const ri = Array.isArray(td.requestsIn)
            ? td.requestsIn
            : Object.values(td.requestsIn || []);
          await update(tr, { requestsIn: ri.filter((x) => x !== ME.id) });
        }
      };

      // ── CHAT PRIVÉ ──────────────────────────────────────────────────────────
      function chatKey(a, b) {
        return [a, b].sort().join("_");
      }

      function updateDock() {
        const dock = document.getElementById("chat-dock");
        if (!dock) return;
        const entries = Object.entries(openChats);
        if (!entries.length) { dock.style.display = "none"; return; }
        dock.style.display = "flex";
        dock.innerHTML = entries.map(([fid, chat]) => {
          const u = usersCache[fid];
          const on = online(fid);
          const unread = chat.unread || 0;
          const isMin = chat.win.classList.contains("minimized");
          return `<div onclick="openChat('${fid}')" style="
            position:relative;cursor:pointer;display:flex;flex-direction:column;
            align-items:center;gap:2px;padding:4px 6px;border-radius:10px;
            background:${isMin ? 'rgba(255,255,255,0.05)' : 'rgba(201,164,76,0.15)'};
            border:1px solid ${isMin ? '#252d3a' : 'var(--accent)'};
            transition:0.15s;min-width:50px;
          ">
            <div style="position:relative">
              ${avatarHtml(u || {name:'?'}, 28)}
              <span class="online-dot ${on?'dot-online':'dot-offline'}"
                style="position:absolute;bottom:0;right:0;border:2px solid #0b0e14;width:7px;height:7px"></span>
              ${unread > 0 ? `<span style="position:absolute;top:-4px;right:-4px;background:#be4444;color:#fff;border-radius:50%;width:15px;height:15px;font-size:0.55rem;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid #0b0e14">${unread}</span>` : ''}
            </div>
            <span style="font-size:0.55rem;color:#888;white-space:nowrap;max-width:50px;overflow:hidden;text-overflow:ellipsis">${esc(u?.name||'?')}</span>
          </div>`;
        }).join("");
      }

      window.openChat = function (fid) {
        const friend = usersCache[fid];
        if (!friend) return;

        // Déjà ouverte : basculer minimiser/maximiser
        if (openChats[fid]) {
          const win = openChats[fid].win;
          const minimized = win.classList.toggle("minimized");
          document.getElementById("min-" + fid).textContent = minimized ? "+" : "−";
          if (!minimized) {
            openChats[fid].unread = 0;
            renderFriends();
            markRead(fid);
            scrollChat(fid);
          }
          updateDock();
          return;
        }

        // Calculer décalage
        const idx = Object.keys(openChats).length;
        const win = document.createElement("div");
        win.className = "chat-window open";
        win.id = "chat-win-" + fid;
        win.style.right = 20 + idx * 310 + "px";
        win.style.bottom = "0px";

        win.innerHTML = `
          <div class="chat-header" onclick="toggleMin('${fid}')">
            <div style="display:flex;align-items:center;gap:8px">
              ${avatarHtml(friend, 26)}
              <span style="font-weight:600;font-size:0.88rem;color:var(--highlight)">${esc(
                friend.name
              )}</span>
              <span class="online-dot ${
                online(fid) ? "dot-online" : "dot-offline"
              }" style="margin-left:2px"></span>
            </div>
            <div style="display:flex;gap:5px;align-items:center">
              <span id="min-${fid}" style="color:#555;font-size:0.85rem;line-height:1">−</span>
              <button onclick="event.stopPropagation();closeChat('${fid}')"
                style="background:none;border:none;color:#555;cursor:pointer;font-size:0.95rem;line-height:1;padding:0 2px">✕</button>
            </div>
          </div>
          <div class="chat-body">
            <div class="chat-msgs" id="msgs-${fid}">
              <div class="bubble-sys">Chargement…</div>
            </div>
            <div id="typing-${fid}" style="font-size:0.68rem;color:#888;font-style:italic;padding:2px 10px 1px;min-height:16px"></div>
            <div style="padding:8px;border-top:1px solid #1e2535;display:flex;gap:6px">
              <input type="text" id="inp-${fid}" placeholder="Message…"
                style="flex:1;margin-bottom:0;padding:6px 10px;font-size:0.82rem"
                onkeydown="if(event.key==='Enter') sendMsg('${fid}')"
                oninput="onTyping('${fid}')"
                maxlength="500" />
              <button class="btn" style="padding:5px 12px;font-size:0.88rem"
                onclick="sendMsg('${fid}')">↗</button>
            </div>
          </div>`;

        document.getElementById("chat-windows").appendChild(win);
        openChats[fid] = { win, unread: 0, unsub: null };
        listenChat(fid);
        listenTyping(fid);
        markRead(fid);
        updateDock();
      };

      window.toggleMin = function (fid) {
        const c = openChats[fid];
        if (!c) return;
        const minimized = c.win.classList.toggle("minimized");
        document.getElementById("min-" + fid).textContent = minimized ? "+" : "−";
        if (!minimized) {
          c.unread = 0;
          renderFriends();
          markRead(fid);
          scrollChat(fid);
        }
        updateDock();
      };

      window.closeChat = function (fid) {
        const c = openChats[fid];
        if (!c) return;
        if (c.unsub) c.unsub();
        if (c.unsubTyping) c.unsubTyping();
        c.win.remove();
        delete openChats[fid];
        renderFriends();
        updateDock();
      };

      function listenChat(fid) {
        const key = chatKey(ME.id, fid);
        const unsub = onValue(ref(db, "privMessages/" + key), (snap) => {
          const box = document.getElementById("msgs-" + fid);
          if (!box) return;

          if (!snap.exists()) {
            box.innerHTML = `<div class="bubble-sys">Début de la conversation 💬</div>`;
            return;
          }

          const msgs = Object.values(snap.val()).sort(
            (a, b) => (a.t || 0) - (b.t || 0)
          );
          const atBot =
            box.scrollHeight - box.scrollTop - box.clientHeight < 60;

          box.innerHTML = msgs
            .map((m) => {
              const isMe = m.from === ME.id;
              const time = new Date(m.t || Date.now()).toLocaleTimeString(
                "fr-FR",
                { hour: "2-digit", minute: "2-digit" }
              );
              return `<div class="chat-bubble ${
                isMe ? "bubble-me" : "bubble-them"
              }">
              ${
                !isMe
                  ? `<div style="font-size:0.62rem;color:#888;margin-bottom:2px">${esc(
                      m.author
                    )}</div>`
                  : ""
              }
              ${esc(m.text)}
              <span class="bubble-time">${time}${
                isMe ? (m.read ? " ✓✓" : " ✓") : ""
              }</span>
            </div>`;
            })
            .join("");

          // Gestion non-lus
          const chat = openChats[fid];
          if (chat) {
            const isMin = chat.win.classList.contains("minimized");
            const newUnread = msgs.filter(
              (m) => m.from !== ME.id && !m.read
            ).length;
            if (isMin && newUnread > 0) {
              if (newUnread > (chat.unread || 0)) {
                const last = msgs.filter((m) => m.from !== ME.id).slice(-1)[0];
                if (last) showMsgToast(usersCache[fid]?.name, last.text, fid);
              }
              chat.unread = newUnread;
              renderFriends();
              updateDock();
            } else if (!isMin) {
              markRead(fid);
            }
          }

          if (atBot) scrollChat(fid);
        });
        if (openChats[fid]) openChats[fid].unsub = unsub;
      }

      function listenTyping(fid) {
        const key = chatKey(ME.id, fid);
        const unsub = onValue(ref(db, "chatTyping/" + key), (snap) => {
          const el = document.getElementById("typing-" + fid);
          if (!el) return;
          if (!snap.exists()) {
            el.innerHTML = "";
            return;
          }
          const now = Date.now();
          const who = Object.entries(snap.val())
            .filter(([id, v]) => id !== ME.id && now - (v.ts || 0) < 3000)
            .map(([, v]) => v.name);
          el.innerHTML = who.length
            ? `<span class="typing-dots"><span></span><span></span><span></span></span>
               <span style="margin-left:5px">${esc(who[0])} écrit…</span>`
            : "";
        });
        if (openChats[fid]) openChats[fid].unsubTyping = unsub;
      }

      window.sendMsg = async function (fid) {
        const inp = document.getElementById("inp-" + fid);
        const txt = inp?.value.trim();
        if (!txt) return;
        inp.value = "";

        const key = chatKey(ME.id, fid);
        await push(ref(db, "privMessages/" + key), {
          from: ME.id,
          author: ME.name,
          text: txt,
          t: Date.now(),
          read: false,
        });

        // Effacer indicateur frappe
        await set(ref(db, "chatTyping/" + key + "/" + ME.id), null);
        clearTimeout(typingTimers[fid]);
      };

      window.onTyping = function (fid) {
        const key = chatKey(ME.id, fid);
        set(ref(db, "chatTyping/" + key + "/" + ME.id), {
          name: ME.name,
          ts: Date.now(),
        });
        clearTimeout(typingTimers[fid]);
        typingTimers[fid] = setTimeout(
          () => set(ref(db, "chatTyping/" + key + "/" + ME.id), null),
          2500
        );
      };

      async function markRead(fid) {
        const key = chatKey(ME.id, fid);
        const snap = await get(ref(db, "privMessages/" + key));
        if (!snap.exists()) return;
        const tasks = [];
        Object.entries(snap.val()).forEach(([msgId, m]) => {
          if (m.from !== ME.id && !m.read)
            tasks.push(set(ref(db, `privMessages/${key}/${msgId}/read`), true));
        });
        await Promise.all(tasks);
        if (openChats[fid]) {
          openChats[fid].unread = 0;
          renderFriends();
        }
      }

      function scrollChat(fid) {
        setTimeout(() => {
          const b = document.getElementById("msgs-" + fid);
          if (b) b.scrollTop = b.scrollHeight;
        }, 50);
      }

      function showMsgToast(name, text, fid) {
        const preview = text.length > 32 ? text.slice(0, 32) + "…" : text;
        document.getElementById(
          "msg-toast-text"
        ).textContent = `💬 ${name} : ${preview}`;
        const toast = document.getElementById("msg-toast");
        toast.classList.add("show");
        clearTimeout(toast._t);
        toast._t = setTimeout(() => toast.classList.remove("show"), 5000);
        // Clic sur le toast → ouvre/focus la fenêtre
        toast.onclick = () => {
          openChat(fid);
          toast.classList.remove("show");
        };
      }

      // ── JOUEURS RÉCENTS ─────────────────────────────────────────────────────
      async function renderRecent() {
        const c = document.getElementById("recent-players");
        const salonId = localStorage.getItem("lg_current_salon");
        if (!salonId) {
          c.innerHTML = `<p style="color:#555;font-style:italic;font-size:0.82rem">Jouez une partie pour voir les joueurs récents.</p>`;
          return;
        }
        const snap = await get(ref(db, "salons/" + salonId));
        if (!snap.exists()) {
          c.innerHTML = `<p style="color:#555;font-style:italic;font-size:0.82rem">Aucun joueur récent.</p>`;
          return;
        }
        const players = (snap.val().players || []).filter(
          (p) => p.id !== ME.id && !p.isBot
        );
        if (!players.length) {
          c.innerHTML = `<p style="color:#555;font-style:italic;font-size:0.82rem">Aucun joueur récent.</p>`;
          return;
        }

        // Charger leurs profils
        await Promise.all(
          players
            .filter((p) => !usersCache[p.id])
            .map(async (p) => {
              const s = await get(ref(db, "users/" + p.id));
              if (s.exists()) usersCache[p.id] = s.val();
            })
        );

        c.innerHTML = players
          .map((p) => {
            const isFriend = myData.friends.includes(p.id);
            const sentReq = myData.requestsOut.includes(p.id);
            return `<div class="friend-card">
            <div style="display:flex;align-items:center;gap:10px">
              ${avatarHtml(usersCache[p.id] || { name: p.name }, 36)}
              <span style="font-weight:600">${esc(p.name)}</span>
            </div>
            ${
              isFriend
                ? `<span class="badge green" style="font-size:0.72rem">Ami ✓</span>`
                : sentReq
                ? `<span style="font-size:0.72rem;color:#888;font-style:italic">Demande envoyée</span>`
                : `<button class="btn" style="font-size:0.75rem;padding:5px 12px"
                  onclick="quickAdd('${p.id}','${esc(
                    p.name
                  )}')">➕ Ajouter</button>`
            }
          </div>`;
          })
          .join("");
      }

      window.quickAdd = async function (targetId, targetName) {
        if (myData.friends.includes(targetId)) {
          showNotif("Déjà ami !");
          return;
        }
        if (myData.requestsOut.includes(targetId)) {
          showNotif("Demande déjà envoyée.");
          return;
        }
        if (!usersCache[targetId]) {
          const s = await get(ref(db, "users/" + targetId));
          if (s.exists()) usersCache[targetId] = s.val();
        }
        await update(myFriendRef, {
          requestsOut: [...myData.requestsOut, targetId],
        });
        const tr = ref(db, "friends/" + targetId);
        const ts = await get(tr);
        const td = ts.exists()
          ? ts.val()
          : { friends: [], requestsIn: [], requestsOut: [] };
        ["friends", "requestsIn", "requestsOut"].forEach((k) => {
          if (!td[k]) td[k] = [];
          else if (!Array.isArray(td[k])) td[k] = Object.values(td[k]);
        });
        await update(tr, { requestsIn: [...td.requestsIn, ME.id] });
        showNotif(`✅ Demande envoyée à ${targetName} !`, true);
        renderRecent();
      };
    </script>
  </body>
</html>
