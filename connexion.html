<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Connexion — Les Loups Garous d'Hurlebois</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(201, 164, 76, 0.3);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .pwd-wrap {
        position: relative;
      }
      .pwd-wrap input {
        padding-right: 2.5rem;
      }
      .pwd-eye {
        position: absolute;
        right: 0.7rem;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        font-size: 1rem;
        padding: 0;
        line-height: 1;
      }
      .pwd-eye:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="notif" id="notif"></div>

    <div class="login-page" style="position:relative;z-index:1">
      <div class="login-box">
        <h1 style="font-size: 2.8rem; margin-bottom: 0.3rem">
          Les Loups Garous d'Hurlebois
        </h1>
        <p
          style="
            color: #888;
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
          "
        >
          Le village Maudit
        </p>

        <div
          class="tabs"
          style="justify-content: center; margin-bottom: 1.2rem"
        >
          <button
            class="tab-btn active"
            id="tab-cnx"
            onclick="switchTab('login')"
          >
            Connexion
          </button>
          <button class="tab-btn" id="tab-reg" onclick="switchTab('register')">
            Inscription
          </button>
        </div>

        <div class="error-msg" id="err"></div>

        <!-- FORMULAIRE CONNEXION -->
        <div id="form-login">
          <input
            type="email"
            id="l-email"
            placeholder="Adresse email"
            autocomplete="email"
          />
          <div class="pwd-wrap">
            <input
              type="password"
              id="l-pass"
              placeholder="Mot de passe"
              autocomplete="current-password"
            />
            <button
              class="pwd-eye"
              onclick="togglePwd('l-pass', this)"
              tabindex="-1"
            >
              👁
            </button>
          </div>
          <button class="btn full" id="btn-login" onclick="doLogin()">
            Se connecter
          </button>
          <p
            style="
              font-size: 0.78rem;
              color: #555;
              margin-top: 0.8rem;
              text-align: center;
            "
          >
            <a href="#" onclick="showForgot()" style="color: var(--accent)"
              >Mot de passe oublié ?</a
            >
          </p>
          <p style="font-size: 0.78rem; color: #555; margin-top: 0.5rem">
            Pas de compte ?
            <a
              href="#"
              onclick="switchTab('register')"
              style="color: var(--accent)"
              >S'inscrire</a
            >
          </p>
        </div>

        <!-- FORMULAIRE INSCRIPTION -->
        <div id="form-register" style="display: none">
          <input
            type="text"
            id="r-name"
            placeholder="Votre pseudo (visible par tous)"
            autocomplete="username"
          />
          <input
            type="email"
            id="r-email"
            placeholder="Adresse email"
            autocomplete="email"
          />
          <div class="pwd-wrap">
            <input
              type="password"
              id="r-pass"
              placeholder="Mot de passe (min. 6 caractères)"
              autocomplete="new-password"
            />
            <button
              class="pwd-eye"
              onclick="togglePwd('r-pass', this)"
              tabindex="-1"
            >
              👁
            </button>
          </div>
          <div class="pwd-wrap">
            <input
              type="password"
              id="r-pass2"
              placeholder="Confirmer le mot de passe"
              autocomplete="new-password"
            />
            <button
              class="pwd-eye"
              onclick="togglePwd('r-pass2', this)"
              tabindex="-1"
            >
              👁
            </button>
          </div>
          <button class="btn full" id="btn-register" onclick="doRegister()">
            Créer mon compte
          </button>
          <p style="font-size: 0.78rem; color: #555; margin-top: 1rem">
            Déjà un compte ?
            <a
              href="#"
              onclick="switchTab('login')"
              style="color: var(--accent)"
              >Se connecter</a
            >
          </p>
        </div>

        <!-- FORMULAIRE MOT DE PASSE OUBLIÉ -->
        <div id="form-forgot" style="display: none">
          <p
            style="
              font-size: 0.85rem;
              color: #aaa;
              text-align: center;
              margin-bottom: 1rem;
              line-height: 1.5;
            "
          >
            Entrez votre adresse email. Vous recevrez un lien pour réinitialiser
            votre mot de passe.
          </p>
          <input
            type="email"
            id="f-email"
            placeholder="Adresse email"
            autocomplete="email"
          />
          <button class="btn full" id="btn-forgot" onclick="doForgot()">
            Envoyer le lien
          </button>
          <p
            style="
              font-size: 0.78rem;
              color: #555;
              margin-top: 1rem;
              text-align: center;
            "
          >
            <a
              href="#"
              onclick="switchTab('login')"
              style="color: var(--accent)"
              >← Retour à la connexion</a
            >
          </p>
        </div>

        <p style="font-size: 0.7rem; color: #333; margin-top: 1.5rem">
          🔒 Connexion sécurisée par Firebase Auth
        </p>
      </div>
    </div>

    <script type="module">
      import {
        db,
        auth,
        ref,
        set,
        get,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        onAuthStateChanged,
        updateProfile,
        sendPasswordResetEmail,
      } from "./firebase.js";

      const SESSION_KEY = "lg_session_v2";

      // ── Si déjà connecté via Firebase Auth → accueil ──────────────────────
      onAuthStateChanged(auth, (user) => {
        if (user && localStorage.getItem(SESSION_KEY)) {
          window.location.href = "accueil.html";
        }
      });

      // ── Utilitaires UI ─────────────────────────────────────────────────────
      window.togglePwd = function (id, btn) {
        const inp = document.getElementById(id);
        inp.type = inp.type === "password" ? "text" : "password";
        btn.textContent = inp.type === "password" ? "👁" : "🙈";
      };

      window.switchTab = function (t) {
        document.getElementById("form-login").style.display =
          t === "login" ? "block" : "none";
        document.getElementById("form-register").style.display =
          t === "register" ? "block" : "none";
        document.getElementById("form-forgot").style.display =
          t === "forgot" ? "block" : "none";
        document.getElementById("tab-cnx").className =
          "tab-btn" + (t === "login" ? " active" : "");
        document.getElementById("tab-reg").className =
          "tab-btn" + (t === "register" ? " active" : "");
        // Cache les onglets quand on est sur forgot
        document.querySelector(".tabs").style.display =
          t === "forgot" ? "none" : "flex";
        document.getElementById("err").textContent = "";
      };

      function setLoading(btnId, loading, label) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.innerHTML = loading
          ? `<span class="spinner"></span>${label}`
          : label;
      }

      function showErr(msg) {
        document.getElementById("err").textContent = msg;
      }

      window.showForgot = function () {
        switchTab("forgot");
      };

      window.doForgot = async function () {
        const email = document
          .getElementById("f-email")
          .value.trim()
          .toLowerCase();
        showErr("");
        if (!email) {
          showErr("Entrez votre adresse email.");
          return;
        }
        setLoading("btn-forgot", true, "Envoi en cours...");
        try {
          const actionCodeSettings = {
            url: "https://grx4s6.csb.app/reset.html",
            handleCodeInApp: false,
          };
          await sendPasswordResetEmail(auth, email, actionCodeSettings);
          // Afficher un message de succès dans le formulaire
          document.getElementById("form-forgot").innerHTML = `
            <div style="text-align:center;padding:1rem 0">
              <div style="font-size:3rem;margin-bottom:1rem">📧</div>
              <div style="font-family:'Cinzel',serif;color:var(--accent);font-size:1.1rem;margin-bottom:0.8rem">Email envoyé !</div>
              <p style="font-size:0.85rem;color:#aaa;line-height:1.6;margin-bottom:1.2rem">
                Un lien de réinitialisation a été envoyé à <strong style="color:var(--highlight)">${email}</strong>.<br/>
                Vérifiez vos spams si vous ne le trouvez pas.
              </p>
              <a href="#" onclick="switchTab('login')" style="color:var(--accent);font-size:0.85rem">← Retour à la connexion</a>
            </div>`;
        } catch (e) {
          setLoading("btn-forgot", false, "Envoyer le lien");
          showErr(firebaseErrMsg(e.code));
        }
      };

      // ── CONNEXION ──────────────────────────────────────────────────────────
      window.doLogin = async function () {
        const email = document
          .getElementById("l-email")
          .value.trim()
          .toLowerCase();
        const pass = document.getElementById("l-pass").value;
        showErr("");

        if (!email || !pass) {
          showErr("Remplissez tous les champs.");
          return;
        }

        setLoading("btn-login", true, "Connexion...");
        try {
          const cred = await signInWithEmailAndPassword(auth, email, pass);
          const uid = cred.user.uid;

          // Récupérer le profil depuis la DB
          const snap = await get(ref(db, "users/" + uid));
          if (!snap.exists()) {
            showErr("Profil introuvable. Contactez l'admin.");
            setLoading("btn-login", false, "Se connecter");
            return;
          }
          const user = snap.val();
          localStorage.setItem(SESSION_KEY, JSON.stringify(user));
          window.location.href = "accueil.html";
        } catch (e) {
          setLoading("btn-login", false, "Se connecter");
          showErr(firebaseErrMsg(e.code));
        }
      };

      // ── INSCRIPTION ────────────────────────────────────────────────────────
      window.doRegister = async function () {
        const name = document.getElementById("r-name").value.trim();
        const email = document
          .getElementById("r-email")
          .value.trim()
          .toLowerCase();
        const pass = document.getElementById("r-pass").value;
        const pass2 = document.getElementById("r-pass2").value;
        showErr("");

        if (!name || !email || !pass || !pass2) {
          showErr("Remplissez tous les champs.");
          return;
        }
        if (name.length < 2) {
          showErr("Pseudo trop court (min. 2 caractères).");
          return;
        }
        if (pass.length < 6) {
          showErr("Mot de passe trop court (min. 6 caractères).");
          return;
        }
        if (pass !== pass2) {
          showErr("Les mots de passe ne correspondent pas.");
          return;
        }

        // Vérif pseudo unique
        setLoading("btn-register", true, "Vérification...");
        try {
          const usersSnap = await get(ref(db, "users"));
          if (usersSnap.exists()) {
            const existing = Object.values(usersSnap.val()).find(
              (u) => u.name.toLowerCase() === name.toLowerCase()
            );
            if (existing) {
              showErr("Ce pseudo est déjà pris.");
              setLoading("btn-register", false, "Créer mon compte");
              return;
            }
          }
        } catch (e) {}

        setLoading("btn-register", true, "Création du compte...");
        try {
          const cred = await createUserWithEmailAndPassword(auth, email, pass);
          const uid = cred.user.uid;

          // Mettre à jour le displayName Firebase
          await updateProfile(cred.user, { displayName: name });

          // Créer le profil en DB
          const user = {
            id: uid,
            name,
            email,
            stats: { games: 0, wins: 0, wolvesKilled: 0 },
            created: Date.now(),
          };
          await set(ref(db, "users/" + uid), user);

          localStorage.setItem(SESSION_KEY, JSON.stringify(user));
          window.location.href = "accueil.html";
        } catch (e) {
          setLoading("btn-register", false, "Créer mon compte");
          showErr(firebaseErrMsg(e.code));
        }
      };

      // ── Messages d'erreur Firebase lisibles ───────────────────────────────
      function firebaseErrMsg(code) {
        const map = {
          "auth/invalid-email": "Adresse email invalide.",
          "auth/user-not-found": "Aucun compte avec cet email.",
          "auth/wrong-password": "Mot de passe incorrect.",
          "auth/invalid-credential": "Email ou mot de passe incorrect.",
          "auth/email-already-in-use": "Cet email est déjà utilisé.",
          "auth/weak-password": "Mot de passe trop faible (min. 6 caractères).",
          "auth/too-many-requests": "Trop de tentatives. Réessayez plus tard.",
          "auth/network-request-failed":
            "Erreur réseau. Vérifiez votre connexion.",
        };
        return map[code] || "Erreur : " + (code || "inconnue");
      }
    </script>
  
  <!-- Bulles animées -->
  <canvas id="bubbles-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none"></canvas>
  <script>
    (function() {
      const canvas = document.getElementById('bubbles-canvas');
      const ctx = canvas.getContext('2d');
      let bubbles = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      function createBubble() {
        const r = Math.random() * 18 + 6;
        return {
          x: Math.random() * canvas.width,
          y: canvas.height + r,
          r: r,
          speed: Math.random() * 0.6 + 0.2,
          opacity: Math.random() * 0.18 + 0.04,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: Math.random() * 0.02 + 0.005,
          wobbleAmp: Math.random() * 20 + 5,
        };
      }

      for (let i = 0; i < 22; i++) {
        const b = createBubble();
        b.y = Math.random() * canvas.height;
        bubbles.push(b);
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        bubbles.forEach(b => {
          b.y -= b.speed;
          b.wobble += b.wobbleSpeed;
          const xPos = b.x + Math.sin(b.wobble) * b.wobbleAmp;

          ctx.beginPath();
          ctx.arc(xPos, b.y, b.r, 0, Math.PI * 2);
          const grad = ctx.createRadialGradient(xPos - b.r*0.3, b.y - b.r*0.3, b.r*0.1, xPos, b.y, b.r);
          grad.addColorStop(0, `rgba(201,164,76,${b.opacity * 1.5})`);
          grad.addColorStop(0.5, `rgba(201,164,76,${b.opacity})`);
          grad.addColorStop(1, `rgba(201,164,76,0)`);
          ctx.fillStyle = grad;
          ctx.fill();

          // Reflet
          ctx.beginPath();
          ctx.arc(xPos - b.r*0.3, b.y - b.r*0.3, b.r*0.25, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255,240,200,${b.opacity * 1.2})`;
          ctx.fill();

          if (b.y + b.r < 0) {
            Object.assign(b, createBubble());
          }
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
